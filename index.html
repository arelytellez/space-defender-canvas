<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Defensa Galáctica</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header class="bg-dark text-center text-light p-3">
        <h1>🚀 Defensa Galáctica</h1>
        <img src="img/logo.png" width="100">
    </header>

    <main class="container text-center mt-4">

        <div class="row">
            <div class="col-md-8 mx-auto">

                <div id="info" class="mb-3">
                    <h5>Instrucciones:</h5>
                    <p>
                        Haz clic sobre las naves antes de que lleguen abajo.
                        Cada nivel aumenta la velocidad.
                        ¡Rompe tu récord!
                    </p>
                    <p>
                        Vidas: <span id="lives">5</span>
                        Score: <span id="score">0</span> |
                        Nivel: <span id="level">1</span> |
                        Record: <span id="highScore">0</span>
                    </p>
                </div>

                <canvas id="gameCanvas" width="800" height="500"></canvas>

            </div>
        </div>

    </main>

    <footer class="bg-dark text-center text-light p-3 mt-4">
        Creado por: Tu Nombre - 2026
    </footer>

    <script src="js/game.js"></script>

</body>

</html>
