<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Defensa Galáctica</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- Sonidos -->
  <audio id="shootSound" src="sounds/shoot.mp3"></audio>
  <audio id="explosionSound" src="sounds/explosion.mp3"></audio>

  <header class="bg-dark text-center text-light p-3">
    <h1>🚀 Defensa Galáctica</h1>
    <img src="img/logo.png" width="100">
  </header>

  <main class="container text-center mt-4">

    <!-- HUD -->
    <div id="hud" class="mb-2">
      Vidas: <span id="lives">❤️❤️❤️❤️❤️</span> |
      Score: <span id="score">0</span> |
      Nivel: <span id="level">1</span> |
      Record: <span id="highScore">0</span>
    </div>

    <!-- Barra -->
    <div id="levelBarContainer">
      <div id="levelBar"></div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <!-- Botones -->
    <div class="mt-3">
      <button id="pauseBtn" class="btn btn-warning">Pausar</button>
      <button id="stopBtn" class="btn btn-danger">Detener</button>
      <button id="restartBtn" class="btn btn-success">Reiniciar</button>
    </div>

  </main>

  <footer class="bg-dark text-center text-light p-3 mt-4">
    Creado por: Tu Nombre - 2026
  </footer>

  <script src="js/game.js"></script>
</body>
</html>
