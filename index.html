<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Defensa Galáctica</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>


<body>

<header class="bg-dark text-center text-light p-3">
  <h1>⭐ Recolector Estelar</h1>
  <img src="img/logo.png" width="100">
</header>

<main class="container-fluid mt-3">

  <!-- BARRA SUPERIOR -->
  <div id="topBar">
    <div id="levelBarContainer">
      <div id="levelBar"></div>
    </div>
  </div>

  <div class="row">

    <!-- PANEL IZQUIERDO -->
    <div class="col-md-2 hud-panel">
      <h4>Nivel</h4>
      <div id="level">1</div>

      <h4 class="mt-3">Vidas</h4>
      <div id="lives">⭐⭐⭐⭐⭐</div>

      <h4 class="mt-3">Score</h4>
      <div id="score">0</div>

      <h4 class="mt-3">Record</h4>
      <div id="highScore">0</div>
    </div>

    <!-- CANVAS -->
    <div class="col-md-8 text-center">
      <canvas id="gameCanvas" width="900" height="500"></canvas>
    </div>

    <!-- BOTONES -->
    <div class="col-md-2 text-center controls-panel">
      <button id="pauseBtn" class="btn btn-danger btn-lg mb-3">Pausar</button>
      <button id="stopBtn" class="btn btn-success btn-lg mb-3">Continuar</button>
      <button id="restartBtn" class="btn btn-secondary btn-lg">Reiniciar</button>
    </div>

  </div>
</main>

<!-- SONIDOS -->
<audio id="collectSound" src="sounds/collect.mp3"></audio>

<script src="js/game.js"></script>
</body>
</html>
